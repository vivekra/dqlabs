version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dqlabs_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dqlabs_network

  paymenter:
    image: ghcr.io/paymenter/paymenter:latest
    container_name: paymenter
    restart: always
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=paymenter-db
      - DB_PORT=3306
      - DB_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - DB_USERNAME=${PAYMENTER_DB_USER:-paymenter}
      - DB_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    depends_on:
      - paymenter-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paymenter.rule=Host(`${PAYMENTER_DOMAIN:-localhost}`)"
      - "traefik.http.services.paymenter.loadbalancer.server.port=8080"
    networks:
      - dqlabs_network

  paymenter-db:
    image: mariadb:10.11
    container_name: paymenter-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${PAYMENTER_MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - MYSQL_USER=${PAYMENTER_DB_USER:-paymenter}
      - MYSQL_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    networks:
      - dqlabs_network

  paymenter-cron:
    image: ghcr.io/paymenter/paymenter:latest
    container_name: paymenter-cron
    restart: always
    entrypoint: php /app/artisan schedule:work
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=paymenter-db
      - DB_PORT=3306
      - DB_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - DB_USERNAME=${PAYMENTER_DB_USER:-paymenter}
      - DB_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    depends_on:
      - paymenter-db
    networks:
      - dqlabs_network

networks:
  dqlabs_network:
    external: true
