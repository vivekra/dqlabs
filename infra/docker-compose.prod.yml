version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dqlabs_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dqlabs_network

  orchestrator:
    build:
      context: ../apps/orchestrator
      dockerfile: Dockerfile
    container_name: dqlabs_orchestrator
    restart: always
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - KUBECONFIG=/root/.kube/config
    ports:
      - "8000:8000"
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/config:ro
    depends_on:
      - redis
    networks:
      - dqlabs_network

  ai_gateway:
    build:
      context: ../apps/ai-gateway
      dockerfile: Dockerfile
    container_name: dqlabs_ai_gateway
    restart: always
    env_file:
      - .env.prod
    ports:
      - "8001:8001"
    networks:
      - dqlabs_network

  celery_worker:
    build:
      context: ../apps/orchestrator
      dockerfile: Dockerfile
    container_name: dqlabs_celery_worker
    restart: always
    command: celery -A core.tasks worker --loglevel=info
    env_file:
      - .env.prod
    environment:
      - REDIS_URL=redis://redis:6379/0
      - KUBECONFIG=/root/.kube/config
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/config:ro
    depends_on:
      - redis
      - orchestrator
    networks:
      - dqlabs_network

  paymenter:
    image: ghcr.io/paymenter/paymenter:latest
    container_name: paymenter
    restart: always
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=paymenter-db
      - DB_PORT=3306
      - DB_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - DB_USERNAME=${PAYMENTER_DB_USER:-paymenter}
      - DB_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    depends_on:
      - paymenter-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paymenter.rule=Host(`${PAYMENTER_DOMAIN:-localhost}`)"
      - "traefik.http.services.paymenter.loadbalancer.server.port=8080"
    networks:
      - dqlabs_network

  paymenter-db:
    image: mariadb:10.11
    container_name: paymenter-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${PAYMENTER_MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - MYSQL_USER=${PAYMENTER_DB_USER:-paymenter}
      - MYSQL_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    networks:
      - dqlabs_network

  paymenter-cron:
    image: ghcr.io/paymenter/paymenter:latest
    container_name: paymenter-cron
    restart: always
    entrypoint: cron -f
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=paymenter-db
      - DB_PORT=3306
      - DB_DATABASE=${PAYMENTER_DB_DATABASE:-paymenter}
      - DB_USERNAME=${PAYMENTER_DB_USER:-paymenter}
      - DB_PASSWORD=${PAYMENTER_DB_PASSWORD:-paymenter}
    depends_on:
      - paymenter-db
    networks:
      - dqlabs_network

networks:
  dqlabs_network:
    driver: bridge
